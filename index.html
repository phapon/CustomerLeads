<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลงทะเบียนเข้าร่วมทริป</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; padding: 20px; }
        .form-container { max-width: 400px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; }
        label { font-weight: bold; display: block; margin-top: 15px; }
        input, select { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; margin-top: 20px; background-color: #27ae60; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; }
        button:hover { background-color: #2ecc71; }
        #message { margin-top: 15px; text-align: center; font-weight: bold; color: green; display: none; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>ฟอร์มติดต่อสอบถามทริป</h2>
    <form id="leadForm">
        <label for="name">ชื่อ-นามสกุล:</label>
        <input type="text" id="name" name="name" required>

        <label for="phone">เบอร์ติดต่อ:</label>
        <input type="tel" id="phone" name="phone" required>

        <label for="tripType">รูปแบบกิจกรรมที่สนใจ:</label>
        <select id="tripType" name="tripType">
            <option value="กางเต็นท์พักผ่อน">กางเต็นท์พักผ่อนชิลๆ</option>
            <option value="เดินป่าศึกษาธรรมชาติ">เดินป่าศึกษาธรรมชาติ</option>
            <option value="วิ่งเทรล">วิ่งเทรล</option>
        </select>

        <button type="submit" id="submitBtn">ส่งข้อมูล</button>
    </form>
    <p id="message">✅ บันทึกข้อมูลสำเร็จ! ทีมงานจะติดต่อกลับไป</p>
</div>

<script>
    document.getElementById('leadForm').addEventListener('submit', function(e) {
        e.preventDefault(); // ป้องกันไม่ให้หน้าเว็บรีเฟรช
        
        var btn = document.getElementById('submitBtn');
        var msg = document.getElementById('message');
        btn.innerText = "กำลังส่งข้อมูล...";
        btn.disabled = true;

        // เปลี่ยน YOUR_WEB_APP_URL เป็น URL ที่ได้จาก Google Apps Script
        var url = 'https://script.google.com/macros/s/AKfycbxVtAQIGxiijSakXn5zp8ScQzOGDW-2mioLGdUKwYM0YfqQmO9GtWw3FqMAvcsrIt0a1A/exec';
        
        // ดึงข้อมูลจากฟอร์ม
        var formData = new FormData(this);

        fetch(url, {
            method: 'POST',
            body: formData,
            mode: 'no-cors' // แก้ปัญหา Cross-Origin สำหรับมือใหม่
        }).then(function() {
            // เมื่อส่งสำเร็จ ให้แสดงข้อความและล้างฟอร์ม
            msg.style.display = 'block';
            document.getElementById('leadForm').reset();
            btn.innerText = "ส่งข้อมูล";
            btn.disabled = false;
        }).catch(function(error) {
            console.error('Error:', error);
            btn.innerText = "ส่งข้อมูล";
            btn.disabled = false;
        });
    });
</script>

</body>
</html>
